<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-Invoice Generator · ZUGFeRD / Factur-X</title>
<meta name="description" content="Free offline ZUGFeRD / Factur-X invoice generator. Runs in the browser, no server, no account.">
<meta property="og:title" content="E-Invoice Generator">
<meta property="og:description" content="Free offline ZUGFeRD / Factur-X invoice generator.">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/src/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>€</text></svg>">
<script>
  // Instant theme application (before paint) — prevents flash of wrong theme
  (function() {
    var pref = localStorage.getItem('erechnung:theme');
    var isDark = pref === 'dark' || (pref === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
</head>
<body>

<noscript style="display:block; padding:20px; background:#fdd; color:#900;">
  This tool requires JavaScript. Please enable it.
</noscript>

<div class="wrap">

<header class="top">
  <div>
    <h1 data-i18n="title">E-Invoice Generator</h1>
    <div class="sub" data-i18n="subtitle">ZUGFeRD 2.3 · Factur-X · EN 16931 (Comfort)</div>
  </div>
  <div class="top-controls">
    <div class="top-group">
      <select id="langSelect" class="lang-select" aria-label="Language">
        <option value="en">EN</option>
        <option value="de">DE</option>
        <option value="fr">FR</option>
      </select>
      <button type="button" id="themeToggle" class="theme-toggle" title="Theme" aria-label="Theme"></button>
    </div>
    <div class="top-group">
      <button id="openHistory" class="tiny-btn top-icon-btn" type="button" data-i18n-title="btn_open_history" aria-label="History">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2.5 4.5 A 5 5 0 1 1 1.8 8.3"/>
          <polyline points="0.6,3.2 2.5,4.5 4.4,3.2"/>
          <polyline points="7,4.2 7,7.2 9,8.8"/>
        </svg>
      </button>
      <button id="openStats" class="tiny-btn top-icon-btn" type="button" data-i18n-title="btn_open_stats" aria-label="Statistics">
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <rect x="1" y="8" width="2.5" height="5" fill="currentColor"/>
          <rect x="5.75" y="4" width="2.5" height="9" fill="currentColor"/>
          <rect x="10.5" y="6" width="2.5" height="7" fill="currentColor"/>
        </svg>
      </button>
      <button id="openHelp" class="tiny-btn top-icon-btn" type="button" data-i18n-title="btn_open_help" aria-label="Help">
        <span aria-hidden="true">?</span>
      </button>
    </div>
  </div>
</header>

<!-- SELLER -->
<section class="block sub" id="sellerSection">
  <div class="seller-head">
    <h2 data-i18n="section_seller"></h2>
    <button id="sellerToggle" class="seller-toggle" type="button" hidden aria-expanded="true">
      <span class="seller-toggle-arrow" aria-hidden="true">▾</span>
      <span class="seller-toggle-summary" id="sellerSummary"></span>
    </button>
  </div>
  <div id="sellerBody">
  <div class="hint"><span data-i18n="section_seller_hint"></span> <button class="tiny-btn" id="saveSeller" type="button" data-i18n="btn_save_template"></button> <button class="tiny-btn" id="clearSeller" type="button" data-i18n="btn_reset"></button></div>
  <div class="grid">
    <label class="full"><span data-i18n="f_company"></span>
      <input type="text" id="s_name" autocomplete="off">
    </label>
    <label class="full"><span data-i18n="f_address"></span>
      <input type="text" id="s_line1" autocomplete="off">
    </label>
    <label><span data-i18n="f_zip"></span>
      <input type="text" id="s_zip" autocomplete="off">
    </label>
    <label><span data-i18n="f_city"></span>
      <input type="text" id="s_city" autocomplete="off">
    </label>
    <label><span data-i18n="f_country_de"></span>
      <input type="text" id="s_country" value="DE" maxlength="2" autocomplete="off">
    </label>
    <label><span data-i18n="f_vat_de"></span>
      <input type="text" id="s_vat" autocomplete="off">
    </label>
    <label><span data-i18n="f_siret"></span>
      <input type="text" id="s_siret" autocomplete="off" data-i18n-placeholder="f_siret_placeholder">
    </label>
    <label><span data-i18n="f_email"></span>
      <input type="email" id="s_email" autocomplete="off">
    </label>
    <label><span data-i18n="f_phone"></span>
      <input type="text" id="s_phone" autocomplete="off">
    </label>
    <label class="half"><span data-i18n="f_iban"></span>
      <input type="text" id="s_iban" autocomplete="off">
    </label>
    <label class="half"><span data-i18n="f_bic"></span>
      <input type="text" id="s_bic" autocomplete="off">
    </label>
    <label class="full"><span data-i18n="f_bank"></span>
      <input type="text" id="s_bank" autocomplete="off">
    </label>
  </div>
  </div>
</section>

<!-- BUYER -->
<section class="block">
  <h2 data-i18n="section_buyer"></h2>
  <div class="hint" data-i18n="section_buyer_hint"></div>
  <div class="picker-row">
    <select id="buyerPicker" aria-label="Buyer profile">
      <option value="" data-i18n="f_buyer_picker"></option>
    </select>
    <button class="tiny-btn" id="saveBuyer" type="button" data-i18n="btn_save_buyer"></button>
    <button class="tiny-btn" id="deleteBuyer" type="button" data-i18n="btn_delete_selected"></button>
  </div>
  <div class="hint buyer-history-hint" id="buyerHistoryHint"></div>
  <div class="grid">
    <label class="full"><span data-i18n="f_company"></span>
      <input type="text" id="b_name">
    </label>
    <label class="full"><span data-i18n="f_address"></span>
      <input type="text" id="b_line1">
    </label>
    <label><span data-i18n="f_zip"></span>
      <input type="text" id="b_zip">
    </label>
    <label><span data-i18n="f_city"></span>
      <input type="text" id="b_city">
    </label>
    <label><span data-i18n="f_country"></span>
      <input type="text" id="b_country" value="FR" maxlength="2">
    </label>
    <label><span data-i18n="f_vat_b2b"></span>
      <input type="text" id="b_vat">
    </label>
    <label><span data-i18n="f_siret"></span>
      <input type="text" id="b_siret" data-i18n-placeholder="f_siret_placeholder">
    </label>
    <label class="full"><span data-i18n="f_buyer_reference"></span>
      <input type="text" id="b_reference">
      <span class="note-small" data-i18n="f_buyer_reference_hint"></span>
    </label>
  </div>
</section>


<!-- INVOICE -->
<section class="block">
  <h2 data-i18n="section_invoice"></h2>
  <div class="hint" data-i18n="section_invoice_hint"></div>
  <div class="grid">
    <label class="full"><span data-i18n="f_number"></span>
      <input type="text" id="r_number">
      <div class="number-pattern-row">
        <button type="button" class="number-chip" id="suggestNumber" data-i18n="chip_next_number"></button>
        <details class="number-pattern-details">
          <summary data-i18n="f_number_pattern_summary"></summary>
          <div class="number-pattern-body">
            <input type="text" id="r_number_pattern" placeholder="{yyyy}-{counter:5}">
            <button type="button" class="tiny-btn" id="saveNumberPattern" data-i18n="btn_save_pattern"></button>
            <div class="due-chips" id="numberPatternChips">
              <button type="button" data-token="{yyyy}" data-i18n="chip_year4"></button>
              <button type="button" data-token="{yy}" data-i18n="chip_year2"></button>
              <button type="button" data-token="{mm}" data-i18n="chip_month"></button>
              <button type="button" data-token="{dd}" data-i18n="chip_day"></button>
              <button type="button" data-token="{counter}" data-i18n="chip_counter"></button>
              <button type="button" data-token="{counter:3}" data-i18n="chip_counter3"></button>
              <button type="button" data-token="{counter:5}" data-i18n="chip_counter5"></button>
            </div>
            <p class="note-small" data-i18n="f_number_pattern_hint"></p>
          </div>
        </details>
      </div>
    </label>
    <label><span data-i18n="f_date"></span>
      <input type="date" id="r_date">
    </label>
    <label><span data-i18n="f_due"></span>
      <input type="date" id="r_due">
      <span class="due-chips">
        <button type="button" data-days="14">+14 <span data-i18n="chip_days"></span></button>
        <button type="button" data-days="30">+30 <span data-i18n="chip_days"></span></button>
        <button type="button" data-days="60">+60 <span data-i18n="chip_days"></span></button>
      </span>
    </label>
    <label><span data-i18n="f_delivery"></span>
      <input type="date" id="r_delivery">
    </label>
    <label><span data-i18n="f_delivery_end"></span>
      <span class="input-with-action">
        <input type="date" id="r_delivery_end">
        <button type="button" class="tiny-btn" id="clearDeliveryEnd" data-i18n="btn_clear"></button>
      </span>
    </label>
    <label><span data-i18n="f_currency"></span>
      <select id="r_currency">
        <option value="EUR">EUR</option>
        <option value="USD">USD</option>
        <option value="GBP">GBP</option>
        <option value="CHF">CHF</option>
      </select>
    </label>
    <label><span data-i18n="f_taxmode"></span>
      <select id="r_taxmode">
        <option value="AE" selected data-i18n="tax_AE"></option>
        <option value="S" data-i18n="tax_S"></option>
        <option value="Z" data-i18n="tax_Z"></option>
        <option value="E" data-i18n="tax_E"></option>
        <option value="O" data-i18n="tax_O"></option>
      </select>
    </label>
    <label><span data-i18n="f_invoice_lang"></span>
      <select id="invoiceLangSelect">
        <option value="" data-i18n="invoice_lang_auto"></option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
      </select>
      <span class="note-small" data-i18n="f_invoice_lang_hint"></span>
    </label>
    <label><span data-i18n="f_invoice_font"></span>
      <select id="invoiceFontSelect">
        <option value="courier-prime">Courier Prime</option>
        <option value="ibm-plex-mono">IBM Plex Mono</option>
        <option value="jetbrains-mono">JetBrains Mono</option>
        <option value="inconsolata">Inconsolata</option>
        <option value="space-mono">Space Mono</option>
      </select>
      <span class="note-small" data-i18n="f_invoice_font_hint"></span>
    </label>
    <label><span data-i18n="f_invoice_layout"></span>
      <select id="invoiceLayoutSelect"></select>
      <span class="note-small" data-i18n="f_invoice_layout_hint"></span>
    </label>
    <label class="full"><span data-i18n="f_project"></span>
      <input type="text" id="r_project" data-i18n-placeholder="f_project_placeholder">
    </label>
    <label class="full"><span data-i18n="f_category"></span>
      <input type="text" id="r_category" data-i18n-placeholder="f_category_placeholder">
    </label>
    <label class="full"><span data-i18n="f_intro"></span>
      <textarea id="r_intro" rows="2" data-i18n-placeholder="f_intro_placeholder"></textarea>
    </label>
    <label class="full"><span data-i18n="f_payment_note"></span>
      <textarea id="r_payment_note" rows="2" data-i18n-placeholder="f_payment_note_placeholder"></textarea>
    </label>
    <label><span data-i18n="f_greeting"></span>
      <input type="text" id="r_greeting" data-i18n-placeholder="f_greeting_placeholder">
    </label>
    <label><span data-i18n="f_signature"></span>
      <input type="text" id="r_signature" data-i18n-placeholder="f_signature_placeholder">
    </label>
    <label class="full"><span data-i18n="f_note"></span>
      <textarea id="r_note" rows="2"></textarea>
      <span class="note-small" id="taxNote"></span>
    </label>
    <label class="full"><span data-i18n="f_footnote"></span>
      <div class="picker-row">
        <select id="footnotePicker">
          <option value="" data-i18n="f_footnote_picker"></option>
        </select>
        <button class="tiny-btn" id="saveFootnote" type="button" data-i18n="btn_save_footnote"></button>
        <button class="tiny-btn" id="deleteFootnote" type="button" data-i18n="btn_delete_footnote"></button>
      </div>
      <textarea id="r_footnote" rows="3" data-i18n-placeholder="f_footnote_placeholder"></textarea>
      <span class="note-small" data-i18n="f_footnote_hint"></span>
    </label>
  </div>
</section>

<!-- LINE ITEMS -->
<section class="block">
  <h2 data-i18n="section_items"></h2>
  <div class="hint" data-i18n="section_items_hint"></div>
  <div class="items" id="items">
    <div class="row head">
      <div data-i18n="th_desc"></div>
      <div class="num" data-i18n="th_qty"></div>
      <div class="num" data-i18n="th_price"></div>
      <div class="num" data-i18n="th_vat_pct"></div>
      <div></div>
    </div>
  </div>
  <button type="button" class="add-row" id="addItem" data-i18n="btn_add_item"></button>

  <div class="totals">
    <div class="label" data-i18n="total_net"></div>
    <div class="val" id="t_net">0,00</div>
    <div class="label" id="t_tax_label">VAT</div>
    <div class="val" id="t_tax">0,00</div>
    <div class="label grand" data-i18n="total_grand"></div>
    <div class="val grand" id="t_total">0,00</div>
  </div>
</section>

<!-- FILENAME -->
<section class="block sub">
  <h2 data-i18n="section_filename"></h2>
  <div class="hint"><span data-i18n="section_filename_hint"></span> <button class="tiny-btn" id="saveFilenamePattern" type="button" data-i18n="btn_save_filename"></button></div>
<div class="due-chips filename-chips" id="filenameChips">
  <button type="button" data-token="{nr}" data-i18n="chip_nr"></button>
  <button type="button" data-token="{project}" data-i18n="chip_project"></button>
  <button type="button" data-token="{buyer}" data-i18n="chip_buyer"></button>
  <button type="button" data-token="{date}" data-i18n="chip_date"></button>
  <button type="button" data-token="{category}" data-i18n="chip_category"></button>
  <button type="button" data-token="{seller}" data-i18n="chip_seller"></button>
  <button type="button" data-token="{layout}" data-i18n="chip_layout"></button>
</div>
    <label class="full"><span data-i18n="f_filename_pattern"></span>
    <input type="text" id="r_filename" placeholder="{nr}_{buyer}_{project}" value="{nr}_{buyer}_{project}">
  </label>
  <div class="note-small filename-preview" id="filenamePreview"></div>
</section>

<footer>
  <p class="footer-disclaimer" data-i18n="footer_disclaimer"></p>
  <p class="footer-backup">
    <span data-i18n="footer_backup"></span>
    <button type="button" class="footer-link-btn" id="btnExport" data-i18n="btn_export_data"></button>
    ·
    <button type="button" class="footer-link-btn" id="btnImport" data-i18n="btn_import_data"></button>
    <input type="file" id="importFile" accept="application/json,.json" class="visually-hidden">
  </p>
</footer>

</div><!-- /.wrap -->

<!-- Sticky bottom action bar — sits outside .wrap so it can span the
     full viewport. Body has padding-bottom matching the bar's height. -->
<div class="action-bar">
  <div class="action-bar-inner">
    <div class="status" id="status"></div>
    <div class="actions">
      <button type="button" class="primary" id="btnPDF" data-i18n="btn_create_pdf"></button>
      <button type="button" class="secondary" id="btnXML" data-i18n="btn_xml_only"></button>
      <button type="button" class="secondary" id="btnValidate" data-i18n="btn_validate"></button>
      <button type="button" class="secondary" id="btnEmbed" data-i18n="btn_embed_xml"></button>
    </div>
  </div>
</div>

<!-- Stats modal -->
<div class="modal" id="statsModal" hidden>
  <div class="modal-content stats-modal-content">
    <div class="modal-head">
      <h2 data-i18n="stats_title"></h2>
      <div class="modal-head-actions">
        <button id="statsYoYToggle" class="tiny-btn" type="button" data-i18n="btn_yoy_toggle" aria-pressed="false"></button>
        <button id="yoyBackfillOpen" class="tiny-btn" type="button" data-i18n="yoy_set_reference"></button>
        <button id="statsExportCsv" class="tiny-btn" type="button" data-i18n="btn_export_csv"></button>
        <button id="statsClose" class="tiny-btn" type="button" data-i18n="stats_close"></button>
      </div>
    </div>

    <div class="modal-controls stats-controls">
      <div class="stats-tabs">
        <button id="statsTabOverview" class="tiny-btn active" type="button" data-i18n="stats_tab_overview"></button>
        <button id="statsTabQuarters" class="tiny-btn" type="button" data-i18n="stats_tab_quarters"></button>
      </div>
      <label class="inline" id="statsPeriodWrap">
        <span data-i18n="stats_period_label"></span>
        <select id="statsPeriod">
          <option value="ytd" selected data-i18n="stats_period_ytd"></option>
          <option value="last12" data-i18n="stats_period_last12"></option>
          <option value="last6" data-i18n="stats_period_last6"></option>
          <option value="last3" data-i18n="stats_period_last3"></option>
          <option value="last_month" data-i18n="stats_period_last_month"></option>
          <option value="all" data-i18n="stats_period_all"></option>
        </select>
      </label>
      <label class="inline" id="statsYearWrap" style="display: none;">
        <span data-i18n="stats_year_label"></span>
        <select id="statsYear"></select>
      </label>
    </div>

    <div id="statsBody" class="stats-body">
      <!-- Filled by renderStatistics() -->
    </div>
  </div>
</div>

<!-- History modal -->
<div class="modal" id="historyModal" hidden>
  <div class="modal-content history-modal-content">
    <div class="modal-head">
      <h2 data-i18n="section_history"></h2>
      <button id="historyClose" class="tiny-btn" type="button" data-i18n="stats_close"></button>
    </div>

    <p class="modal-intro" data-i18n="section_history_hint"></p>

    <div class="input-with-action">
      <select id="historyPicker" aria-label="Past invoice">
        <!-- Filled by renderHistoryPicker() -->
      </select>
      <button class="tiny-btn" id="historyClone" type="button" data-i18n="btn_history_clone"></button>
    </div>

    <div class="history-bottom-row">
      <label class="inline">
        <input type="checkbox" id="historyEnable">
        <span data-i18n="history_enable_label"></span>
      </label>
      <div class="history-bottom-actions">
        <button class="tiny-btn" id="historyAddPast" type="button" data-i18n="btn_history_add_past"></button>
        <button class="tiny-btn" id="historyDelete" type="button" data-i18n="btn_history_delete"></button>
        <button class="tiny-btn" id="historyClearAll" type="button" data-i18n="btn_history_clear_all"></button>
      </div>
    </div>
  </div>
</div>

<!-- Help modal -->
<div class="modal" id="helpModal" hidden>
  <div class="modal-content help-modal-content">
    <div class="modal-head">
      <h2 data-i18n="help_title"></h2>
      <button id="helpClose" class="tiny-btn" type="button" data-i18n="stats_close"></button>
    </div>
    <div id="helpBody" class="help-body">
      <!-- Filled by openHelpModal() with rendered README -->
    </div>
  </div>
</div>

<!-- Embed-XML modal -->
<div class="modal" id="embedModal" hidden>
  <div class="modal-content embed-modal-content">
    <div class="modal-head">
      <h2 data-i18n="embed_title"></h2>
      <button id="embedClose" class="tiny-btn" type="button" data-i18n="stats_close"></button>
    </div>
    <p class="modal-intro" data-i18n="embed_intro"></p>
    <div class="drop" id="drop">
      <div data-i18n="drop_pdf"></div>
      <div class="fname" id="fname"></div>
    </div>
    <input type="file" id="file" accept="application/pdf,.pdf" class="visually-hidden">
    <div class="embed-actions">
      <button type="button" class="primary" id="btnEmbedRun" data-i18n="btn_embed_run"></button>
    </div>
  </div>
</div>

<!-- Past-invoice modal -->
<div class="modal" id="pastInvoiceModal" hidden>
  <div class="modal-content past-invoice-content">
    <div class="modal-head">
      <h2 data-i18n="past_modal_title"></h2>
      <button id="pastCancel" class="tiny-btn" type="button" data-i18n="past_cancel"></button>
    </div>
    <p class="modal-intro" data-i18n="past_modal_intro"></p>
    <div class="grid">
      <label><span data-i18n="past_field_date"></span>
        <input type="date" id="past_date">
      </label>
      <label><span data-i18n="past_field_number"></span>
        <input type="text" id="past_number" autocomplete="off">
      </label>
      <label class="full"><span data-i18n="past_field_buyer_select"></span>
        <select id="past_buyer_select"></select>
      </label>
      <label class="full"><span data-i18n="past_field_buyer"></span>
        <input type="text" id="past_buyer_text" autocomplete="off">
      </label>
      <label><span data-i18n="past_field_currency"></span>
        <input type="text" id="past_currency" maxlength="3" value="EUR">
      </label>
      <label><span data-i18n="past_field_total"></span>
        <input type="number" id="past_total" step="0.01" min="0">
      </label>
      <label><span data-i18n="past_field_taxmode"></span>
        <select id="past_taxmode">
          <option value="S" data-i18n="tax_S"></option>
          <option value="AE" data-i18n="tax_AE"></option>
          <option value="Z" data-i18n="tax_Z"></option>
          <option value="E" data-i18n="tax_E"></option>
          <option value="O" data-i18n="tax_O"></option>
        </select>
      </label>
      <label id="past_vat_rate_wrap"><span data-i18n="past_field_vat_rate"></span>
        <input type="number" id="past_vat_rate" step="1" min="0" value="20">
      </label>
      <label><span data-i18n="past_field_project"></span>
        <input type="text" id="past_project" autocomplete="off">
      </label>
      <label><span data-i18n="past_field_category"></span>
        <input type="text" id="past_category" autocomplete="off">
      </label>
    </div>
    <div class="past-modal-actions">

  </div>
